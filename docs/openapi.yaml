openapi: 3.0.3
info:
  title: OpenBao Teradata Secret Plugin API
  description: |
    Dynamic database credentials plugin for Teradata using ODBC.

    This plugin provides secure, dynamic database credential generation for Teradata databases.
    All endpoints require a valid OpenBao token with appropriate policies.
  version: 0.1.0
  contact:
    name: OpenBao Teradata Plugin
    url: https://github.com/JavierLimon/openbao-teradata-secret-plugin
  license:
    name: MPL-2.0
    url: https://www.mozilla.org/en-US/MPL/2.0/
servers:
  - url: /teradata
    description: OpenBao Teradata secret engine mount path
  - url: /teradata/v1
    description: OpenBao Teradata secret engine v1 API path
tags:
  - name: Configuration
    description: Database connection configuration
  - name: Roles
    description: Role management for credential generation
  - name: Credentials
    description: Dynamic credential generation and management
  - name: Leases
    description: Lease lifecycle management
  - name: Statements
    description: SQL statement template management
  - name: Monitoring
    description: Health, readiness, and metrics endpoints
  - name: Admin
    description: Administrative operations
  - name: v1 API
    description: Backward compatible v1 API endpoints

paths:
  /reload-config:
    post:
      tags: [Admin]
      summary: Reload plugin configuration
      operationId: reloadConfig
      responses:
        '200':
          description: Configuration reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      reloaded:
                        type: boolean
                        example: true

  /config/reload:
    post:
      tags: [Admin]
      summary: Reload configuration (v1 compatibility)
      operationId: reloadConfigV1
      responses:
        '200':
          description: Configuration reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      reloaded:
                        type: boolean
                        example: true

  /reload/plugin:
    post:
      tags: [Admin]
      summary: Reload entire plugin
      operationId: reloadPlugin
      responses:
        '200':
          description: Plugin reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      reloaded:
                        type: boolean
                        example: true
  /config:
    get:
      tags: [Configuration]
      summary: Read configuration
      operationId: readConfig
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Configuration]
      summary: Create/Update configuration
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigRequest'
      responses:
        '200':
          description: Configuration created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Configuration]
      summary: Delete configuration
      operationId: deleteConfig
      responses:
        '204':
          description: Configuration deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /config/{region}:
    get:
      tags: [Configuration]
      summary: Read regional configuration
      operationId: readRegionalConfig
      parameters:
        - name: region
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '200':
          description: Regional configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Configuration]
      summary: Create/Update regional configuration
      operationId: createRegionalConfig
      parameters:
        - name: region
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigRequest'
      responses:
        '200':
          description: Regional configuration created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Configuration]
      summary: Delete regional configuration
      operationId: deleteRegionalConfig
      parameters:
        - name: region
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '204':
          description: Regional configuration deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /config/backup:
    get:
      tags: [Configuration]
      summary: Backup all plugin configuration
      operationId: backupConfig
      responses:
        '200':
          description: Backup created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupResponse'

  /config/restore:
    post:
      tags: [Configuration]
      summary: Restore configuration from backup
      operationId: restoreConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - backup
              properties:
                backup:
                  type: string
                  description: Base64 encoded backup data
      responses:
        '200':
          description: Configuration restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  restored:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'

  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      operationId: listRoles
      responses:
        '200':
          description: Roles listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolesListResponse'

  /roles/{name}:
    get:
      tags: [Roles]
      summary: Read role configuration
      operationId: readRole
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '200':
          description: Role retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Roles]
      summary: Create/Update role
      operationId: createRole
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: Role created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Roles]
      summary: Delete role
      operationId: deleteRole
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '204':
          description: Role deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /creds/{name}:
    get:
      tags: [Credentials]
      summary: Generate dynamic credentials
      operationId: generateCredentials
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
        - name: region
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Credentials generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /creds/batch/{name}:
    get:
      tags: [Credentials]
      summary: Generate batch credentials
      operationId: generateBatchCredentials
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 1
        - name: region
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Batch credentials generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCredentialsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /revoke-cred/{username}:
    delete:
      tags: [Credentials]
      summary: Revoke credential
      operationId: revokeCredential
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '200':
          description: Credential revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'

  /renew-cred/{username}:
    post:
      tags: [Credentials]
      summary: Renew credential password
      operationId: renewCredential
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '200':
          description: Credential renewed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRenewalResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /renew-cred/batch/{name}:
    post:
      tags: [Credentials]
      summary: Batch renew credentials
      operationId: batchRenewCredentials
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: usernames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Batch credentials renewed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchRenewalResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /leases:
    get:
      tags: [Leases]
      summary: List all leases
      operationId: listLeases
      responses:
        '200':
          description: Leases listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeasesListResponse'

  /leases/{lease_id}:
    get:
      tags: [Leases]
      summary: Get lease information
      operationId: getLease
      parameters:
        - name: lease_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lease retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /leases/cleanup:
    post:
      tags: [Leases]
      summary: Clean up expired credentials
      operationId: cleanupLeases
      responses:
        '200':
          description: Expired credentials cleaned up
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleaned:
                    type: integer

  /leases/extend/{lease_id}:
    post:
      tags: [Leases]
      summary: Extend lease TTL
      operationId: extendLease
      parameters:
        - name: lease_id
          in: path
          required: true
          schema:
            type: string
        - name: ttl
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Lease extended successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseExtendResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /lookup-lease:
    post:
      tags: [Leases]
      summary: Lookup lease by ID
      operationId: lookupLease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - lease_id
              properties:
                lease_id:
                  type: string
      responses:
        '200':
          description: Lease found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /statements:
    get:
      tags: [Statements]
      summary: List statement templates
      operationId: listStatements
      responses:
        '200':
          description: Statement templates listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementsListResponse'

  /statements/{name}:
    get:
      tags: [Statements]
      summary: Read statement template
      operationId: readStatement
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '200':
          description: Statement template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Statements]
      summary: Create/Update statement template
      operationId: createStatement
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatementRequest'
      responses:
        '200':
          description: Statement template created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Statements]
      summary: Delete statement template
      operationId: deleteStatement
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_-]+$'
      responses:
        '204':
          description: Statement template deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /rotate-root:
    post:
      tags: [Configuration]
      summary: Rotate root credentials
      operationId: rotateRoot
      responses:
        '200':
          description: Root credentials rotated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotated:
                    type: boolean

  /webhook/config:
    get:
      tags: [Configuration]
      summary: Read webhook configuration
      operationId: readWebhookConfig
      responses:
        '200':
          description: Webhook configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfigResponse'
    post:
      tags: [Configuration]
      summary: Create/Update webhook configuration
      operationId: createWebhookConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookConfigRequest'
      responses:
        '200':
          description: Webhook configuration created/updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookConfigResponse'
    delete:
      tags: [Configuration]
      summary: Delete webhook configuration
      operationId: deleteWebhookConfig
      responses:
        '204':
          description: Webhook configuration deleted successfully

  /rate-limit/config:
    get:
      tags: [Monitoring]
      summary: Read rate limit configuration
      operationId: readRateLimitConfig
      responses:
        '200':
          description: Rate limit configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitConfigResponse'
    post:
      tags: [Monitoring]
      summary: Update rate limit configuration
      operationId: updateRateLimitConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateLimitConfigRequest'
      responses:
        '200':
          description: Rate limit configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitConfigResponse'

  /rate-limit/status:
    get:
      tags: [Monitoring]
      summary: Get rate limit status
      operationId: getRateLimitStatus
      responses:
        '200':
          description: Rate limit status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitStatusResponse'

  /health:
    get:
      tags: [Monitoring]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Plugin is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Plugin is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readiness:
    get:
      tags: [Monitoring]
      summary: Readiness probe
      operationId: readinessCheck
      responses:
        '200':
          description: Plugin is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Plugin is not ready

  /liveness:
    get:
      tags: [Monitoring]
      summary: Liveness probe
      operationId: livenessCheck
      responses:
        '200':
          description: Plugin is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'

  /version:
    get:
      tags: [Monitoring]
      summary: Get plugin version
      operationId: getVersion
      responses:
        '200':
          description: Plugin version retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string

  /api-version:
    get:
      tags: [Monitoring]
      summary: Get API version information
      operationId: getAPIVersion
      responses:
        '200':
          description: API version information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIVersionResponse'

  /info:
    get:
      tags: [Monitoring]
      summary: Get database info
      operationId: getDatabaseInfo
      responses:
        '200':
          description: Database info retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseInfoResponse'

  /pool-stats:
    get:
      tags: [Monitoring]
      summary: Get connection pool statistics
      operationId: getPoolStats
      responses:
        '200':
          description: Pool statistics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolStatsResponse'

  /metrics:
    get:
      tags: [Monitoring]
      summary: Get Prometheus metrics
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /v1/config:
    $ref: '#/components/pathItems/v1Config'

  /v1/roles:
    $ref: '#/components/pathItems/v1Roles'

  /v1/roles/{name}:
    $ref: '#/components/pathItems/v1RolesName'

  /v1/creds/{name}:
    $ref: '#/components/pathItems/v1Creds'

  /v1/rotate-root:
    $ref: '#/components/pathItems/v1RotateRoot'

components:
  schemas:
    ConfigRequest:
      type: object
      required:
        - connection_string
      properties:
        connection_string:
          type: string
          description: ODBC connection string
          example: "DSN=MyTeradata;UID=admin;PWD=password"
        min_connections:
          type: integer
          description: Minimum pool connections
          default: 0
          minimum: 0
        max_open_connections:
          type: integer
          description: Maximum open connections
          default: 5
          minimum: 1
        max_idle_connections:
          type: integer
          description: Maximum idle connections
          default: 2
        connection_timeout:
          type: integer
          description: Connection timeout in seconds
          default: 30
        max_connection_lifetime:
          type: integer
          description: Maximum connection lifetime in seconds
          default: 3600
        idle_timeout:
          type: integer
          description: Idle timeout in seconds
          default: 300
        ssl_mode:
          type: string
          enum: [disable, allow, verify-ca, verify-full, require]
          default: disable
        ssl_cert:
          type: string
          description: Path to SSL certificate
        ssl_key:
          type: string
          description: Path to SSL key
        ssl_root_cert:
          type: string
          description: Path to SSL root CA
        ssl_key_password:
          type: string
          description: SSL key password
          writeOnly: true
        ssl_cipher_suites:
          type: string
          description: Comma-separated SSL cipher suites
        ssl_secure:
          type: boolean
          default: false
        ssl_version:
          type: string
          description: SSL/TLS version (TLS 1.2, TLS 1.3)
        max_retries:
          type: integer
          description: Max connection retry attempts
          default: 3
          minimum: 0
        initial_retry_interval:
          type: integer
          description: Initial retry interval in milliseconds
          default: 100
          minimum: 0
        max_retry_interval:
          type: integer
          description: Max retry interval in milliseconds
          default: 5000
          minimum: 0
        retry_multiplier:
          type: number
          description: Exponential backoff multiplier
          default: 2.0
          minimum: 1.0
        session_variables:
          type: object
          additionalProperties:
            type: string
          description: Session variables for connections
        graceful_degradation_mode:
          type: boolean
          description: Continue operating when database is unavailable
          default: false

    ConfigResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            connection_string:
              type: string
              description: Connection string (masked)
            max_open_connections:
              type: integer
            max_idle_connections:
              type: integer
            connection_timeout:
              type: integer
            max_connection_lifetime:
              type: integer
            idle_timeout:
              type: integer
            ssl_mode:
              type: string
            ssl_secure:
              type: boolean
            initialized:
              type: boolean

    BackupResponse:
      type: object
      properties:
        backup:
          type: string
          description: Base64 encoded backup data
        version:
          type: string
        plugin_name:
          type: string
        roles_count:
          type: integer
        statements_count:
          type: integer
        config_exists:
          type: boolean

    RoleRequest:
      type: object
      required:
        - db_user
      properties:
        db_user:
          type: string
          description: Database username template
          example: "vault_user"
        db_password:
          type: string
          description: Database password template (use {{password}} placeholder)
        default_ttl:
          type: integer
          description: Default lease TTL in seconds
          default: 3600
          minimum: 1
        max_ttl:
          type: integer
          description: Maximum lease TTL in seconds
          default: 86400
        renewal_period:
          type: integer
          description: Auto renewal period in seconds (0=disabled)
          default: 0
        statement_template:
          type: string
          description: Name of statement template to use
        default_database:
          type: string
          default: "USER"
        perm_space:
          type: integer
          description: Permanent space in bytes (0=unlimited)
          default: 0
        spool_space:
          type: integer
          description: Spool space in bytes
          default: 0
        account:
          type: string
          description: Account string
        fallback:
          type: boolean
          description: Enable fallback protection
          default: false
        creation_statement:
          type: string
          description: SQL to run after CREATE USER
          example: "GRANT SELECT ON mydb TO {{username}};"
        revocation_statement:
          type: string
          description: SQL to run before DROP USER
          example: "REVOKE ALL ON mydb FROM {{username}};"
        rollback_statement:
          type: string
          description: SQL to run if user creation fails
        renewal_statement:
          type: string
          description: SQL to run after password renewal
        max_credentials:
          type: integer
          description: Maximum credentials allowed (0=unlimited)
          default: 0
        session_variables:
          type: object
          additionalProperties:
            type: string
          description: Session variables for user sessions

    RoleResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            name:
              type: string
            db_user:
              type: string
            default_ttl:
              type: integer
            max_ttl:
              type: integer
            renewal_period:
              type: integer
