  pathItems:
    v1Config:
      get:
        tags: [v1 API]
        summary: v1 - Read configuration
        operationId: v1ReadConfig
        responses:
          '200':
            description: Configuration retrieved successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ConfigResponse'
      post:
        tags: [v1 API]
        summary: v1 - Create/Update configuration
        operationId: v1CreateConfig
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRequest'
        responses:
          '200':
            description: Configuration created/updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ConfigResponse'
      delete:
        tags: [v1 API]
        summary: v1 - Delete configuration
        operationId: v1DeleteConfig
        responses:
          '204':
            description: Configuration deleted successfully

    v1Roles:
      get:
        tags: [v1 API]
        summary: v1 - List roles
        operationId: v1ListRoles
        responses:
          '200':
            description: Roles listed successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/RolesListResponse'

    v1RolesName:
      get:
        tags: [v1 API]
        summary: v1 - Read role
        operationId: v1ReadRole
        parameters:
          - name: name
            in: path
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Role retrieved successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/RoleResponse'
      post:
        tags: [v1 API]
        summary: v1 - Create/Update role
        operationId: v1CreateRole
        parameters:
          - name: name
            in: path
            required: true
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleRequest'
        responses:
          '200':
            description: Role created/updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/RoleResponse'
      delete:
        tags: [v1 API]
        summary: v1 - Delete role
        operationId: v1DeleteRole
        parameters:
          - name: name
            in: path
            required: true
            schema:
              type: string
        responses:
          '204':
            description: Role deleted successfully

    v1Creds:
      get:
        tags: [v1 API]
        summary: v1 - Generate credentials
        operationId: v1GenerateCredentials
        parameters:
          - name: name
            in: path
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Credentials generated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CredentialsResponse'

    v1RotateRoot:
      post:
        tags: [v1 API]
        summary: v1 - Rotate root credentials
        operationId: v1RotateRoot
        responses:
          '200':
            description: Root credentials rotated successfully
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    rotated:
                      type: boolean
