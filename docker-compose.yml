version: '3.8'

services:
  teradata:
    image: teradata/express:21.20.0.15
    container_name: teradata-dev
    environment:
      - NODE_NAME=td1
      - MAX_SESSIONS=120
      - ADDITIONAL_FLAGS=
    ports:
      - "1025:1025"
      - "1026:1026"
      - "1030:1030"
    volumes:
      - teradata-data:/var/lib/teradata
    healthcheck:
      test: ["CMD", "bteq", "-e", "select 1;", "-q"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    privileged: true
    shm_size: 2g

  openbao:
    image: openbao/openbao:latest
    container_name: openbao-dev
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=baotester
      - VAULT_ADDR=http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - openbao-data:/vault/data
    cap_add:
      - IPC_LOCK
    depends_on:
      teradata:
        condition: service_healthy

  teradata-plugin:
    build:
      context: .
      dockerfile: Dockerfile.plugin
    container_name: teradata-plugin-dev
    environment:
      - ODBCINI=/opt/teradata/client/21.20/odbc_64/odbc.ini
      - TERADATA_ODBC_DRIVER=Teradata Database ODBC Driver 21.20
      - TERADATA_HOST=teradata
      - TERADATA_PORT=1025
    network_mode: service:teradata
    depends_on:
      teradata:
        condition: service_healthy

volumes:
  teradata-data:
  openbao-data:
